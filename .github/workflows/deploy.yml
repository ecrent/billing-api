name: Build & Deploy API

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/ecrent/billing-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/eanil/compose

            # Activate billing-api nginx config on first deploy
            if [ -f /opt/eanil/nginx/conf.d/billing-api.conf.disabled ]; then
              mv /opt/eanil/nginx/conf.d/billing-api.conf.disabled \
                 /opt/eanil/nginx/conf.d/billing-api.conf
            fi

            docker pull ghcr.io/ecrent/billing-api:latest
            docker compose up -d billing-api
            docker compose exec -T nginx nginx -s reload

            # Clean up old images
            docker image prune -f
