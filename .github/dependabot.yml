version: 2
updates:

  # Maven dependencies
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    ignore:
      # Major version upgrades require deliberate migration work — handle manually
      - dependency-name: "org.springframework.boot:spring-boot-starter-parent"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.springdoc:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "net.javacrumbs.shedlock:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.mapstruct:*"
        update-types: ["version-update:semver-major"]

  # Docker base images (updates the digest pins in Dockerfile automatically)
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    ignore:
      # Java version upgrades (e.g. 21 → 25) require explicit testing — handle manually
      - dependency-name: "eclipse-temurin"
        update-types: ["version-update:semver-major"]
      - dependency-name: "maven"
        update-types: ["version-update:semver-major"]

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    ignore:
      # Major version jumps in actions can have breaking changes — handle manually
      - dependency-name: "actions/checkout"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/setup-java"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/upload-artifact"
        update-types: ["version-update:semver-major"]
      - dependency-name: "docker/login-action"
        update-types: ["version-update:semver-major"]
      - dependency-name: "docker/build-push-action"
        update-types: ["version-update:semver-major"]
